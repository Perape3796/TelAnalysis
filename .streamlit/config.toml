[client]
# Hide the "Deploy" button and other Streamlit Cloud / dev-only menu items.
# Options: "auto" | "developer" | "viewer" | "minimal"
toolbarMode = "minimal"

[browser]
gatherUsageStats = false

[theme]
# Match the dashboard's default dark palette (analysis/theme.py). Users can
# toggle plotly/cards to light at runtime — the chrome itself can't be switched
# from sidebar, only here.
base = "dark"
primaryColor = "#FF6B6B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1A1F2E"
textColor = "#E5E7EB"
